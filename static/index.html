<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>服薬指導ロープレ練習</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>

<!-- ── Header ─────────────────────────────────────────────────── -->
<header id="header">
  <h1>服薬指導ロープレ練習
    <span>薬剤師向けトレーニング</span>
  </h1>
  <div id="model-badge">
    <span id="model-name">読込中…</span>
  </div>
</header>

<!-- ── Main ───────────────────────────────────────────────────── -->
<div id="main">

  <!-- ── Left Panel ──────────────────────────────────────────── -->
  <aside id="left-panel">

    <!-- Preset Management -->
    <div class="panel-section">
      <div class="panel-label">プリセット</div>
      <div class="preset-row">
        <select id="preset-select">
          <option value="">── プリセットを選択 ──</option>
        </select>
        <button id="preset-load-btn" class="preset-btn" title="読み込み">読込</button>
        <button id="preset-delete-btn" class="preset-btn danger" title="削除">削除</button>
      </div>
      <div class="preset-save-row">
        <input type="text" id="preset-name-input" placeholder="プリセット名を入力…" />
        <button id="preset-save-btn" class="preset-btn primary">保存</button>
      </div>
    </div>

    <!-- Personality -->
    <div class="panel-section">
      <div class="panel-label">患者の性格</div>
      <div id="personality-tabs">
        <button class="personality-btn active" data-personality="talkative">
          <span class="icon">😄</span>
          <span class="label">話好き</span>
        </button>
        <button class="personality-btn" data-personality="quiet">
          <span class="icon">🤫</span>
          <span class="label">無口</span>
        </button>
        <button class="personality-btn" data-personality="proxy">
          <span class="icon">👨‍👩‍👧</span>
          <span class="label">代理</span>
        </button>
      </div>
    </div>

    <!-- Patient Background -->
    <div class="panel-section">
      <div class="panel-label-row">
        <span class="panel-label" style="margin-bottom:0">患者背景</span>
        <button class="collapse-btn" id="bg-collapse-btn" title="折りたたむ">▲</button>
      </div>
      <div id="patient-bg-form">
        <div class="bg-row">
          <label>年齢</label>
          <input type="text" id="bg-age" placeholder="例: 65歳" />
          <label>性別</label>
          <select id="bg-gender">
            <option value="">-</option>
            <option value="男性">男性</option>
            <option value="女性">女性</option>
            <option value="その他">その他</option>
          </select>
        </div>
        <div class="bg-field">
          <label>主訴 / 来局目的</label>
          <input type="text" id="bg-complaint" placeholder="例: 高血圧・糖尿病で通院中" />
        </div>
        <div class="bg-field">
          <label>既往歴・合併症</label>
          <input type="text" id="bg-history" placeholder="例: 心筋梗塞、慢性腎不全" />
        </div>
        <div class="bg-field">
          <label>アレルギー・禁忌</label>
          <input type="text" id="bg-allergies" placeholder="例: ペニシリン系アレルギー" />
        </div>
        <div class="bg-field">
          <label>その他（生活習慣など）</label>
          <input type="text" id="bg-notes" placeholder="例: 独居、飲酒習慣あり" />
        </div>
      </div>
    </div>

    <!-- Voice Options -->
    <div class="panel-section">
      <div class="panel-label">音声設定</div>
      <div id="voice-options">
        <div class="toggle-row">
          <div class="toggle on" id="voice-out-toggle" title="音声出力ON/OFF"></div>
          <span>音声出力</span>
        </div>
        <div class="toggle-row">
          <div class="toggle on" id="voice-in-toggle" title="音声入力ON/OFF"></div>
          <span>音声入力</span>
        </div>
      </div>
    </div>

    <!-- Prescription -->
    <div id="prescription-section">
      <div class="panel-label">処方薬登録</div>
      <div class="search-row">
        <input
          type="text"
          id="drug-search-input"
          placeholder="品名を入力して検索…"
          autocomplete="off"
          spellcheck="false"
        />
      </div>
      <div id="drug-search-results"></div>

      <div class="prescription-list-label">処方薬リスト</div>
      <div id="prescription-list"></div>
      <div id="prescription-empty">処方薬が登録されていません。<br/>上の検索欄から薬を追加してください。</div>
    </div>

  </aside>

  <!-- ── Right Panel (Chat) ──────────────────────────────────── -->
  <section id="right-panel">

    <!-- Status strip -->
    <div id="avatar-strip">
      <div id="avatar-info">
        <div id="avatar-name">患者（模擬）</div>
        <div id="avatar-status-text">待機中</div>
      </div>
      <span id="personality-display">話好き</span>
      <button id="reset-btn" title="会話をリセット">⟳ リセット</button>
    </div>

    <!-- Messages -->
    <div id="chat-messages"></div>

    <!-- Input bar -->
    <div id="input-bar">
      <button id="voice-btn" class="input-btn" title="音声入力">🎤</button>
      <textarea
        id="msg-input"
        rows="1"
        placeholder="薬剤師として服薬指導の言葉を入力… (Enter で送信)"
      ></textarea>
      <button id="send-btn" class="input-btn" title="送信">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
      </button>
    </div>

  </section>
</div>

<script src="/js/voice.js"></script>
<script src="/js/app.js"></script>

<!-- Debug panel: visible only when URL contains ?debug -->
<script>
(function() {
  if (!location.search.includes('debug')) return;
  const panel = document.createElement('div');
  panel.id = 'debug-panel';
  panel.style.cssText = [
    'position:fixed','bottom:0','left:0','right:0','max-height:35vh',
    'overflow-y:auto','background:rgba(0,0,0,.85)','color:#0f0',
    'font:11px/1.4 monospace','padding:6px 8px','z-index:9999',
    'white-space:pre-wrap','word-break:break-all'
  ].join(';');
  document.body.appendChild(panel);

  const orig = console.log.bind(console);
  console.log = (...args) => {
    orig(...args);
    const line = document.createElement('div');
    line.textContent = new Date().toLocaleTimeString('ja-JP') + ' ' + args.join(' ');
    panel.appendChild(line);
    panel.scrollTop = panel.scrollHeight;
    if (panel.children.length > 80) panel.removeChild(panel.firstChild);
  };
  const origWarn = console.warn.bind(console);
  console.warn = (...args) => {
    origWarn(...args);
    const line = document.createElement('div');
    line.style.color = '#ff0';
    line.textContent = '[WARN] ' + new Date().toLocaleTimeString('ja-JP') + ' ' + args.join(' ');
    panel.appendChild(line);
    panel.scrollTop = panel.scrollHeight;
  };
  console.log('[Debug] panel active');
})();
</script>
</body>
</html>
